PACKAGE_NAME="kiln-rknpu"
PACKAGE_VERSION="0.9.8"
BUILT_MODULE_NAME[0]="rknpu"
DEST_MODULE_LOCATION[0]="/kernel/drivers/accel/rknpu"
AUTOINSTALL="yes"
# Fetch the GPL vendor rknpu source and apply Kiln's mainline + RK3576 NPU patch
# before each build (the vendor source is not vendored into the tree). Needs
# network at build time; pre-fetch driver/rknpu if the target will be offline.
PRE_BUILD="driver/fetch-vendor-driver.sh"
# The out-of-tree module is built via the top-level Kbuild (DRM_GEM path).
MAKE[0]="make KDIR=$kernel_source_dir"
CLEAN="make KDIR=$kernel_source_dir clean"
